name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/matchpoint/requirements.txt

      - name: Check format
        run: |
          ruff check --output-format=github .

      - name: Start database
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: |
          until docker compose exec -T postgres pg_isready -U postgres; do
            sleep 1
          done

      - name: Run migrations
        env:
          SECRET_KEY: test-secret
        run: python src/matchpoint/manage.py migrate

      - name: Run Tests
        run: |
          cd src/matchpoint && pytest --cov
